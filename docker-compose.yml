services:
  web:
    container_name: bookstore-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    image: bookstore-frontend:local
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    networks:
      - bookstore-network
    restart: unless-stopped

networks:
  bookstore-network:
    external: true
    name: bookstore-network