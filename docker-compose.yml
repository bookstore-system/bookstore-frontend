version: '3.8'

services:
  frontend:
    image: node:20-alpine
    container_name: dev-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - bookstore-network

networks:
  bookstore-network:
    external: true
